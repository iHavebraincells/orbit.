<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/nav/logo.svg">
    <title>orbit</title>
    <link rel="stylesheet" href="css/search.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <style>
        /* Ensure full viewport coverage */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Iframe fills entire page behind the controls */
        #searchframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 0;
        }
        /* Controls float above the iframe */
        #controls {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
    </style>
</head>
<body style="background-repeat: no-repeat;">
    <div class="controls" id="controls">
        <div class="topbar">
            <div class="hide" id="toggleControls"></div>
        </div>
        <div class="controls-inner">
            <a>
                <img src="icons/nav/logo.svg" onclick="navigateInternal('index.htM')">
            </a>
            <form id="uv-form">
                <input
                    id="uv-search-engine"
                    value="https://www.google.com/search?hl=en-us&q=%s"
                    type="hidden">
                <input
                    id="uv-address"
                    type="text"
                    placeholder="welcome back"
                    class="form__input">
            </form>
            <a id="back"><img src="c-icons/previous.png"></a>
            <a id="forward"><img src="c-icons/next.png"></a>
            <a id="refresh"><img src="c-icons/refresh.svg"></a>
        </div>
    </div>
    <iframe id="searchframe"></iframe>

    <script src="js/iframe.js"></script>
    <!-- <script src="js/search.js"></script> -->
    <script src="js/settings.js"></script>
    <script src="/orb/bundle.js" defer></script>
    <script src="/orb/config.js?cdn" defer></script>
    <script>
        function navigateInternal(url) {
            window.__setAllowExit?.(true);
            window.location.href = url;
        }
        const controls = document.getElementById("controls");
        const toggle = document.getElementById("toggleControls");
        let hidden = false;
        toggle.addEventListener("click", () => {
            hidden = !hidden;
            controls.classList.toggle("hidden", hidden);
        });

        /* -------------------------
             UV FORM HANDLER
          -------------------------- */
        const form = document.querySelector("#uv-form");
        const input = document.querySelector("#uv-address");
        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            await navigator.serviceWorker.register("/orb/sw.js", {
                scope: uv$config.prefix,
            });
            let url = input.value.trim();
            if (!url.includes("http")) {
                if (url.includes(".")) url = "http://" + url;
                else url = "https://www.google.com/search?hl=en-us&q=" + url;
            }
            if (url.includes("now.gg")) {
                alert("redirecting...");
                url = "https://nowgg.lol/hub";
            }
            sessionStorage.setItem("encodedUrl", uv$config.encodeUrl(url));
            location.href = "search.htM";
        });

        /* -------------------------
             GAME JOIN HANDLER
          -------------------------- */
        const params = new URLSearchParams(window.location.search);
        const joinid = params.get("game");
        if (joinid) {
            location.href = "/share.html?game=" + joinid;
        }
    </script>
</body>
</html>
