<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/nav/logo.svg">
    <title>orbit</title>
    <link rel="stylesheet" href="css/search.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
</head>
<body style="background-repeat: no-repeat;">
    <div class="controls" id="controls">
        <div class="topbar">
            <div class="hide" id="toggleControls"></div>
        </div>
        <div class="controls-inner">
            <a>
                <img src="icons/nav/logo.svg" onclick="navigateInternal('index.htM')">
            </a>
            <form id="uv-form">
                <input
                    id="uv-address"
                    type="text"
                    placeholder="welcome back"
                    class="form__input"
                    autocomplete="off">
            </form>
            <a id="back"><img src="c-icons/previous.png"></a>
            <a id="forward"><img src="c-icons/next.png"></a>
            <a id="refresh"><img src="c-icons/refresh.svg"></a>
        </div>
    </div>
    <iframe id="searchframe"></iframe>

    <!-- search.js handles all search logic -->
    <script src="js/search.js"></script>
    <script src="js/settings.js"></script>
    <!-- UV proxy bundle — loaded after page so search.js can fall back gracefully -->
    <script src="/orb/bundle.js" defer></script>
    <script src="/orb/config.js?cdn" defer></script>
    <script>
        function navigateInternal(url) {
            window.__setAllowExit?.(true);
            window.location.href = url;
        }

        // toggle controls bar
        const controls = document.getElementById("controls");
        const toggle = document.getElementById("toggleControls");
        let hidden = false;
        toggle.addEventListener("click", () => {
            hidden = !hidden;
            controls.classList.toggle("hidden", hidden);
        });

        // game join redirect
        const params = new URLSearchParams(window.location.search);
        const joinid = params.get("game");
        if (joinid) {
            location.href = "/share.html?game=" + joinid;
        }
    </script>
</body>
</html>
